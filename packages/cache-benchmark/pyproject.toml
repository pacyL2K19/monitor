[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cache-benchmark"
version = "0.1.0"
description = "Replay harness for benchmarking semantic cache implementations"
license = { text = "Apache-2.0" }
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "datasets>=2.18",
    "sentence-transformers>=3.0",
    "numpy>=1.26",
    "pandas>=2.2",
    "tqdm>=4.66",
    "click>=8.1",
    "pydantic>=2.6",
    "pyyaml>=6.0",
    "valkey[asyncio]>=6.0.0",
    "betterdb-semantic-cache>=0.4.0",
    "redisvl>=0.7",
    "gptcache>=0.1.44",
    "faiss-cpu>=1.8",
    "redis>=5.0",
    "sqlalchemy>=2.0.49",
    "cohere>=7.0.0",
    "openai>=2.38.0",
]

[project.scripts]
cache-bench = "cache_benchmark.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/cache_benchmark"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""
